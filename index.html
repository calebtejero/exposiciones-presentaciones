<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exposiciones y Presentaciones</title>
    <style>
        /* Estilos limpios y profesionales para la web */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            line-height: 1.6; 
            color: #333; 
            max-width: 800px; 
            margin: 0 auto; 
            padding: 40px 20px; 
            background-color: #f9f9f9; 
        }
        h1 { 
            color: #2c3e50; 
            border-bottom: 2px solid #3498db; 
            padding-bottom: 10px; 
            margin-bottom: 20px;
        }
        p.intro { 
            color: #555; 
            font-size: 1.1em;
            margin-bottom: 30px;
        }
        .report-list { 
            list-style: none; 
            padding: 0; 
        }
        .report-item { 
            background: #fff; 
            border: 1px solid #e0e0e0; 
            border-radius: 8px; 
            margin-bottom: 20px; 
            padding: 20px; 
            transition: box-shadow 0.3s ease, transform 0.2s ease; 
        }
        .report-item:hover { 
            box-shadow: 0 6px 12px rgba(0,0,0,0.08); 
            transform: translateY(-2px);
        }
        .report-title { 
            font-size: 1.3em; 
            margin: 0 0 8px 0; 
        }
        .report-title a { 
            text-decoration: none; 
            color: #2980b9; 
            font-weight: 600;
        }
        .report-title a:hover { 
            text-decoration: underline; 
            color: #1c5981;
        }
        .report-date { 
            font-size: 0.9em; 
            color: #7f8c8d; 
            margin: 0 0 12px 0; 
            font-style: italic;
        }
        .report-desc {
            margin: 0;
            color: #444;
        }
    </style>
</head>
<body>

    <h1>Repositorio de presentaciones</h1>
    <p class="intro">Índice principal >> Seleccionar un reporte para visualizar.</p>
    
    <ul class="report-list">
        
        <li class="report-item">
            <h2 class="report-title"><a href="sialkot_report.html">Reporte de Sialkot</a></h2>
            <p class="report-date">Mayo 2026</p>
            <p class="report-desc">Documento de análisis, visualización de datos y conclusiones correspondientes al caso Sialkot.</p>
        </li>

        </ul>

</body>
</html>
